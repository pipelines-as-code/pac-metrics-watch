# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: pac-metrics-watch

before:
  hooks:
    - go test ./...

builds:
  - id: pac-metrics-watch
    main: .
    binary: pac-metrics-watch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: pac-metrics-watch
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - README.md
      - LICENSE
      - AGENTS.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-next"

release:
  prerelease: auto

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - Merge pull request
      - Merge branch
